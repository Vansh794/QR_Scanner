<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Database Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
            padding: 6px 12px;
            font-size: 0.9em;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-box {
            flex: 1;
            min-width: 200px;
            background: #f0f9ff;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-box h3 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 5px;
        }

        .stat-box p {
            color: #666;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .empty {
            text-align: center;
            color: #999;
            padding: 40px;
            font-style: italic;
        }

        .loading {
            text-align: center;
            color: #667eea;
            padding: 20px;
            font-weight: 600;
        }

        .error {
            background: #f8d7da;
            border-left: 4px solid #e74c3c;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .data-cell {
            word-break: break-all;
            max-width: 400px;
        }

        .copy-btn {
            padding: 4px 8px;
            font-size: 0.8em;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .copy-btn:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 QR Code Database Viewer</h1>

        <div class="controls">
            <button class="btn btn-primary" onclick="loadData()">Refresh Data</button>
            <button class="btn btn-primary" onclick="goBack()">Back to Scanner</button>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div class="stats">
            <div class="stat-box">
                <h3 id="totalScans">0</h3>
                <p>Total Scans</p>
            </div>
            <div class="stat-box">
                <h3 id="lastScan">-</h3>
                <p>Latest Scan</p>
            </div>
        </div>

        <div id="loading" class="loading" style="display: none;">Loading data...</div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>QR Data</th>
                        <th>Scanned At</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr class="empty">
                        <td colspan="3">No scans yet</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const BACKEND_URL = "http://localhost:8000";

        function loadData() {
            const loading = document.getElementById("loading");
            loading.style.display = "block";

            fetch(`${BACKEND_URL}/scans`)
                .then(response => {
                    if (!response.ok) throw new Error("Failed to load data");
                    return response.json();
                })
                .then(data => {
                    loading.style.display = "none";
                    displayData(data.scans || []);
                })
                .catch(err => {
                    loading.style.display = "none";
                    showError("Error loading data: " + err.message);
                });
        }

        function displayData(scans) {
            const tableBody = document.getElementById("tableBody");
            const totalScans = document.getElementById("totalScans");
            const lastScan = document.getElementById("lastScan");

            totalScans.textContent = scans.length;

            if (scans.length === 0) {
                tableBody.innerHTML = '<tr class="empty"><td colspan="3">No scans yet</td></tr>';
                lastScan.textContent = "-";
                return;
            }

            // Get last scan time
            const lastTime = new Date(scans[0].scanned_at).toLocaleString();
            lastScan.textContent = lastTime;

            let html = "";
            scans.forEach(scan => {
                const scanTime = new Date(scan.scanned_at).toLocaleString();
                html += `
                    <tr>
                        <td class="data-cell">
                            <code>${escapeHtml(scan.data)}</code>
                        </td>
                        <td>${scanTime}</td>
                        <td>
                            <button class="copy-btn" onclick="copyData('${scan.data}')">Copy</button>
                            <button class="copy-btn btn-danger" onclick="deleteScan('${scan.id}')">Delete</button>
                        </td>
                    </tr>
                `;
            });

            tableBody.innerHTML = html;
        }

        function copyData(data) {
            navigator.clipboard.writeText(data).then(() => {
                alert("Copied to clipboard!");
            }).catch(() => {
                alert("Failed to copy");
            });
        }

        function deleteScan(scanId) {
            if (!confirm("Delete this scan?")) return;

            fetch(`${BACKEND_URL}/scan/${scanId}`, { method: "DELETE" })
                .then(response => {
                    if (!response.ok) throw new Error("Failed to delete");
                    loadData();
                })
                .catch(err => {
                    showError("Error deleting scan: " + err.message);
                });
        }

        function showError(message) {
            const error = document.getElementById("error");
            error.textContent = message;
            error.style.display = "block";
        }

        function goBack() {
            window.location.href = "index.html";
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Load data on page load
        window.addEventListener("load", loadData);
    </script>
</body>
</html>
